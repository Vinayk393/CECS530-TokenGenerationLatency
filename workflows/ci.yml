name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas matplotlib seaborn pytest

      - name: Run unit tests (no model download required)
        run: |
          python -m pytest tests/ -v

      - name: Generate figures from CSVs
        run: |
          python analysis/generate_research_graphs.py